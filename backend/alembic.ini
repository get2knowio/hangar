# Alembic configuration for the Hangar dev CLI (run from backend/).
#
# The migrations live *inside* the installed package (src/hangar/migrations) so they
# ship in the wheel and the container can locate them at runtime without this file
# (see hangar.persistence.db.apply_migrations, which builds an Alembic Config
# programmatically). This ini is only for the developer-facing `alembic` CLI.
#
# The database URL is resolved at runtime in env.py from HANGAR_DATABASE_URL
# (falling back to Settings), so sqlalchemy.url here is a placeholder only.
[alembic]
script_location = src/hangar/migrations
prepend_sys_path = src
path_separator = os
sqlalchemy.url = sqlite+aiosqlite:///./hangar.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
