name: Release Please

# Maintains a release PR from Conventional Commits on main: it keeps CHANGELOG.md,
# bumps the version in pyproject.toml and package.json, and on merge tags `vX.Y.Z`
# and publishes a GitHub Release — which in turn triggers the image build in
# release.yml. Configuration lives in release-please-config.json /
# .release-please-manifest.json.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
