name: CodeQL

# Static analysis (code scanning) for the backend (Python) and frontend
# (TypeScript/JavaScript). Results appear under the repo's Security tab.
# (Hangar policy check: code_scanning — flips green after the first analysis
# lands on the default branch.)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 6 * * 1" # weekly, Monday 06:23 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ["python", "javascript-typescript"]
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c54b30b7df092240050e69945842bc67aee0f0f4 # v4.37.3
        with:
          language: ${{ matrix.language }}

      - name: Analyze
        uses: github/codeql-action/analyze@c54b30b7df092240050e69945842bc67aee0f0f4 # v4.37.3
