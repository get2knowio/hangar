name: Release

# Build and publish the Hangar container image to GHCR when a version tag is
# pushed (e.g. `v0.1.0`) or a GitHub Release is published. No image is built or
# published on ordinary pushes/PRs — that stays in ci.yml.
on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  image:
    name: Build & publish image (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # push to ghcr.io
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          # ghcr.io/<owner>/<repo>, lowercased automatically.
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Mark the newest release as :latest (skipped for pre-releases like v1.0.0-rc1).
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build & push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          # Build context is the repo root so the Dockerfile can reach backend/ and frontend/.
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
