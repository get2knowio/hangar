name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default for GITHUB_TOKEN; CI only needs to read the checkout.
permissions:
  contents: read

jobs:
  backend:
    name: Backend (Python 3.14)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python 3.14
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (with dev extras)
        run: pip install -e '.[dev]'

      - name: Generate a throwaway Fernet key
        # FR-032 requires a Fernet key; the test run gets a fresh one each CI run.
        run: echo "HANGAR_SECRET_KEY=$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> "$GITHUB_ENV"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy

      - name: Test (pytest)
        env:
          # Fail-closed gate requires an explicit access mode (FR-029); tests
          # run in the no-proxy mode. HANGAR_SECRET_KEY was put on $GITHUB_ENV above.
          HANGAR_FORWARD_AUTH: disabled
        run: pytest

  frontend:
    name: Frontend (Node 26)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Frontend is being built in parallel; skip cleanly until package.json lands.
      - name: Detect frontend package
        id: detect
        shell: bash
        run: |
          if [ -f frontend/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::frontend/package.json not found — skipping frontend job steps."
          fi
        working-directory: ${{ github.workspace }}

      - name: Set up Node 26
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install (npm ci)
        if: steps.detect.outputs.present == 'true'
        run: npm ci

      - name: Lint
        if: steps.detect.outputs.present == 'true'
        run: npm run lint

      - name: Build
        if: steps.detect.outputs.present == 'true'
        run: npm run build

      - name: Test
        if: steps.detect.outputs.present == 'true'
        run: npm test
