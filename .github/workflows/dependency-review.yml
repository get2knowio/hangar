name: Dependency review

# Fails a PR that introduces a dependency with a known vulnerability or a
# disallowed license. Reviews only the dependency delta, so it is a no-op on
# PRs that touch no manifests. (Hangar policy check: dep_review.)
on:
  pull_request:

permissions:
  contents: read

jobs:
  review:
    name: Dependency review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
