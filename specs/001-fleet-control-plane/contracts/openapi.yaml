openapi: 3.1.0
info:
  title: Hangar Fleet Control Plane API
  version: 0.1.0
  description: >
    Typed, versioned contract between the Hangar FastAPI backend and the React SPA.
    Frontend TypeScript types are generated from this document (Constitution VII —
    no hand-drifted types). All reads serve the cached snapshot (no live provider
    bursts, SC-010). All write corrections are human-triggered, idempotent, and
    audit-logged (FR-013–FR-018). Access is enforced upstream by forward-auth; the
    identity reaches the API via the trusted proxy header.
servers:
  - url: /api/v1
tags:
  - { name: system }
  - { name: fleet }
  - { name: scorecard }
  - { name: catalog }
  - { name: providers }
  - { name: repos }
  - { name: remediation }

paths:
  /health:
    get:
      tags: [system]
      summary: Liveness/readiness (Constitution VI). Unauthenticated.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status, connections]
                properties:
                  status: { type: string, enum: [ok, degraded] }
                  access_mode: { type: string, enum: [forward-auth, oidc, disabled] }
                  connections:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        last_sync_at: { type: string, format: date-time }
                        stale: { type: boolean }

  /me:
    get:
      tags: [system]
      summary: Resolved operator identity + access mode (drives sidebar access badge). Gated.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [actor, access_mode]
                properties:
                  actor: { type: string, description: proxy/OIDC identity, or HANGAR_OPERATOR in disabled mode }
                  access_mode: { type: string, enum: [forward-auth, oidc, disabled] }
                  user_header: { type: string, example: Remote-User }
                  login_url: { type: string, example: /auth/login }
                  logout_url: { type: string, example: /auth/logout }
        "401": { description: No session (oidc mode, signed out) }

  /auth/info:
    get:
      tags: [auth]
      summary: Public pre-login probe — lets the SPA decide whether to show the login screen.
      description: >
        Unauthenticated and exempt from the access-control middleware. In oidc mode reports
        whether a valid session exists; in forward-auth/disabled mode always authenticated.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [mode, authenticated, login_url, logout_url]
                properties:
                  mode: { type: string, enum: [forward-auth, oidc, disabled] }
                  authenticated: { type: boolean }
                  actor: { type: string, nullable: true }
                  login_url: { type: string, example: /auth/login }
                  logout_url: { type: string, example: /auth/logout }

  /auth/logout:
    post:
      tags: [auth]
      summary: Clear the OIDC session (best-effort RP-initiated IdP logout when configured).
      responses:
        "200": { description: Logged out, content: { application/json: { schema: { type: object, properties: { ok: { type: boolean } } } } } }
        "303": { description: Redirect to the IdP end-session endpoint }

  /fleet/overview:
    get:
      tags: [fleet]
      summary: Fleet overview screen — stat tiles, repo table, attention feed (FR-001–FR-004).
      parameters:
        - $ref: "#/components/parameters/Connection"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [summary, stats, repos, feed]
                properties:
                  summary:
                    type: object
                    properties:
                      repo_count: { type: integer }
                      compliance_pct: { type: integer }
                      synced: { type: string, example: 2m ago }
                      ci_failing: { type: integer, description: repos with failing default-branch CI }
                      critical_alerts: { type: integer, description: total critical security alerts }
                  stats:
                    type: array
                    description: six tiles — Open PRs, Bot PRs, CI failing, Sec alerts, Release pending, Compliance
                    items:
                      type: object
                      properties:
                        label: { type: string }
                        value: { type: string }
                        sub: { type: string }
                        tone: { $ref: "#/components/schemas/Tone" }
                        sub_tone: { $ref: "#/components/schemas/Tone" }
                  repos:
                    type: array
                    items: { $ref: "#/components/schemas/RepoRow" }
                  feed:
                    type: array
                    description: needs-attention items sorted by urgency (critical→CI→release→alerts→bot PRs)
                    items:
                      type: object
                      properties:
                        tag: { type: string }
                        title: { type: string }
                        repo_id: { type: string }
                        connection_id: { type: string, description: owning connection — for connection-scoped drill-in }
                        tone: { $ref: "#/components/schemas/Tone" }

  /fleet/scorecard:
    get:
      tags: [scorecard]
      summary: Hygiene scorecard matrix + roll-up (FR-005–FR-007).
      parameters:
        - $ref: "#/components/parameters/Connection"
        - { name: failing_only, in: query, schema: { type: boolean, default: false } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [compliance_pct, checks, rows, rollup]
                properties:
                  compliance_pct: { type: integer }
                  clear_count: { type: integer }
                  repo_count: { type: integer }
                  groups:
                    type: array
                    items: { type: object, properties: { label: {type: string}, span: {type: integer} } }
                  checks:
                    type: array
                    items: { type: object, properties: { id: { type: string }, label: { type: string }, fail_count: { type: integer } } }
                  rows:
                    type: array
                    items:
                      type: object
                      properties:
                        repo_id: { type: string }
                        connection_id: { type: string, description: owning connection — for connection-scoped drill-in }
                        hygiene_pct: { type: integer }
                        connection_badge: { type: string }
                        cells:
                          type: array
                          items: { $ref: "#/components/schemas/FindingStatus" }
                  rollup:
                    type: array
                    description: top drift — checks with most failures
                    items: { type: object, properties: { label: { type: string }, count: { type: integer } } }

  /catalog:
    get:
      tags: [catalog]
      summary: Check catalog grouped, with current policy enablement, targets, and pass rates (FR-008, FR-009, FR-019).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled_count: { type: integer }
                  total_count: { type: integer }
                  groups:
                    type: array
                    items:
                      type: object
                      properties:
                        group: { type: string }
                        checks:
                          type: array
                          items: { $ref: "#/components/schemas/CatalogCheck" }

  /policy:
    get:
      tags: [catalog]
      summary: The single fleet-wide policy (FR-019).
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Policy" } } } }
    patch:
      tags: [catalog]
      summary: Toggle a check or set a target; scorecard recomputes (FR-019).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                check_id: { type: string }
                enabled: { type: boolean }
                params: { type: object, additionalProperties: true, example: { target: 7 } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Policy" } } } }

  /providers:
    get:
      tags: [providers]
      summary: Connection cards + access banner state (FR-021–FR-026, FR-027–FR-032).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  access:
                    type: object
                    properties:
                      mode: { type: string, enum: [forward-auth, disabled] }
                      user_header: { type: string }
                      allowed_user: { type: string, nullable: true }
                      fail_closed: { type: boolean }
                  connections:
                    type: array
                    items: { $ref: "#/components/schemas/ConnectionCard" }
                  app_registrations:
                    type: array
                    description: "stored GitHub App registrations (per host) — surfaced so the UI can offer to 'forget' one before re-provisioning. Non-secret fields only."
                    items: { $ref: "#/components/schemas/AppRegistration" }
    post:
      tags: [providers]
      summary: Add a provider connection — configuration, not code (FR-024, SC-004).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider_type, label, scope]
              properties:
                provider_type: { type: string, enum: [github, gitea] }
                label: { type: string }
                scope: { type: string }
                credential: { type: string, description: "write-only; GitHub App private-key PEM or a PAT/token. Encrypted at rest (FR-032)" }
                copy_credential_from: { type: string, nullable: true, description: "reuse another same-provider connection's stored credential instead of pasting one again" }
                app_id: { type: string, nullable: true, description: GitHub App id (App connections only) }
                installation_id: { type: integer, nullable: true, description: GitHub App installation id (App connections only) }
                writable: { type: boolean, default: false, description: grant write tiers only if the credential can write (least-privilege, FR-026) }
                webhook_secret: { type: string, description: "write-only; per-connection inbound-webhook HMAC secret. Encrypted at rest; falls back to the global secret when omitted (FR-033)" }
                owner: { type: string, description: "org/user that owns the repos; defaults to the label suffix when omitted" }
                base_url: { type: string, nullable: true, description: "provider browser host; github.com when omitted. Set to a GHES host (https://ghe.example.com) or GHEC data-residency tenant (https://acme.ghe.com) — the adapter derives the API host from it" }
                repo_allowlist:
                  type: array
                  nullable: true
                  items: { type: string }
                  description: "repo names to watch; omit/null ⇒ watch every repo the credential can see"
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/ConnectionCard" } } } }
  /providers/{connection_id}:
    delete:
      tags: [providers]
      summary: Remove a connection — drops its repos/findings/snapshots; audit entries retained (clarification).
      parameters: [ { name: connection_id, in: path, required: true, schema: { type: string } } ]
      responses: { "204": { description: Removed } }

  /providers/{connection_id}/repos:
    get:
      tags: [providers]
      summary: List repos the connection's credential can see, plus the current allowlist selection.
      description: >
        Explicit management action (the repo picker) — unlike dashboard reads this makes a
        live provider call to enumerate candidates. selected=null ⇒ watching all.
      parameters: [ { name: connection_id, in: path, required: true, schema: { type: string } } ]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  connection_id: { type: string }
                  owner: { type: string }
                  available:
                    type: array
                    items:
                      type: object
                      required: [name, private]
                      properties:
                        name: { type: string }
                        private: { type: boolean, description: "repo visibility on the provider" }
                  selected: { type: array, nullable: true, items: { type: string } }
                  watching_all: { type: boolean }
        "404": { description: Unknown connection }
        "502": { description: Provider could not list repos }
    put:
      tags: [providers]
      summary: Replace the connection's repo allowlist; prunes de-selected snapshots and resyncs.
      parameters: [ { name: connection_id, in: path, required: true, schema: { type: string } } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                repos:
                  type: array
                  nullable: true
                  items: { type: string }
                  description: "repo names to watch; null/empty ⇒ watch all"
      responses:
        "200": { description: Updated, content: { application/json: { schema: { $ref: "#/components/schemas/ConnectionCard" } } } }
        "404": { description: Unknown connection }

  /providers/sync:
    post:
      tags: [providers]
      summary: Manually refresh every connection now (operator-triggered re-interrogation).
      description: >
        Enqueues an immediate background re-interrogation of all connections — the same path
        as the scheduled poll, so reads stay cache-served and the request never blocks on the
        provider. The dashboard reflects the result once the sync lands (202 Accepted).
      responses:
        "202": { description: Accepted, content: { application/json: { schema: { $ref: "#/components/schemas/SyncAccepted" } } } }

  /providers/{connection_id}/sync:
    post:
      tags: [providers]
      summary: Manually refresh one connection now (operator-triggered re-interrogation).
      parameters: [ { name: connection_id, in: path, required: true, schema: { type: string } } ]
      responses:
        "202": { description: Accepted, content: { application/json: { schema: { $ref: "#/components/schemas/SyncAccepted" } } } }
        "404": { description: Unknown connection }

  /providers/github/app/new:
    get:
      tags: [providers]
      summary: Start the one-click "Connect with GitHub" App manifest flow (#25).
      description: >
        Browser-navigated (not fetch). Stashes a CSRF state in the session, then either returns
        an auto-submitting HTML form that POSTs a generated App **manifest** to the chosen host's
        `/settings/apps/new`, or — if an App already exists for that host — 303-redirects straight
        to the install page. Behind the access-control middleware (the operator is logged in).
      parameters:
        - { name: base_url, in: query, schema: { type: string, default: "https://github.com" }, description: "target GitHub host (github.com, a GHEC tenant, or a GHES instance)" }
        - { name: writable, in: query, schema: { type: boolean, default: true }, description: "request contents/pull_requests write so Hangar can open fix PRs" }
      responses:
        "200": { description: Auto-submitting manifest form (HTML) }
        "303": { description: Redirect to GitHub's App install page (App already provisioned for this host) }
  /providers/github/app/created:
    get:
      tags: [providers]
      summary: Manifest redirect_url — exchange the code for App credentials, then go install.
      description: >
        Browser-navigated. Validates the CSRF state, exchanges the one-time manifest `code` for
        the App credentials (id/slug/pem/secrets), stores the per-host registration (secrets
        Fernet-encrypted), and 303-redirects to GitHub's install page. State mismatch → 400.
      parameters:
        - { name: code, in: query, required: true, schema: { type: string } }
        - { name: state, in: query, required: true, schema: { type: string } }
      responses:
        "303": { description: Redirect to GitHub's App install page }
        "400": { description: CSRF state mismatch }
  /providers/github/app/installed:
    get:
      tags: [providers]
      summary: App setup_url — create the connection from the real installation, return to SPA.
      description: >
        Browser-navigated. Validates the CSRF state, resolves the installation's owner and
        repo selection (selected repos ⇒ allowlist; all ⇒ watch everything), creates the
        connection, and 303-redirects to the SPA `/providers?connected=<id>`. State mismatch → 400.
      parameters:
        - { name: installation_id, in: query, required: true, schema: { type: integer } }
        - { name: setup_action, in: query, schema: { type: string } }
        - { name: state, in: query, required: true, schema: { type: string } }
      responses:
        "303": { description: Redirect to the SPA providers screen with the new connection id }
        "400": { description: CSRF state mismatch }

  /providers/github/app/forget:
    post:
      tags: [providers]
      summary: Forget a host's GitHub App — uninstall everywhere, drop dependent connections, discard stored credentials.
      description: >
        Tears down the App registered for a host: authenticates as the App to uninstall it from
        every account it is installed on, removes the connections that depended on it, then
        forgets Hangar's stored credentials. Uninstall runs first (while the key is still held).
        GitHub has no delete-App API, so the response returns `delete_app_url` — a deep link to
        the App's Advanced settings — for the operator to finish deleting the App by hand.
        Audited as one teardown entry. 404 when no App is registered for the host.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                base_url: { type: string, default: "https://github.com", description: "browser host whose App to tear down (github.com or an enterprise host)" }
      responses:
        "200": { description: Torn down, content: { application/json: { schema: { $ref: "#/components/schemas/ForgetAppResult" } } } }
        "404": { description: No App registered for this host }

  /providers/audit:
    get:
      tags: [providers]
      summary: Audit log — every correction, immutable (FR-016).
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 50 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AuditEntry" }

  /repos/{connection_id}/{repo_id}:
    get:
      tags: [repos]
      summary: Repo drill-down — activity strip + grouped policy checks with remediation controls (Story 3).
      description: >
        A repo is addressed by (connection_id, repo_id); resolving by repo_id alone is
        forbidden because same-named repos can exist under different connections (Constitution I).
      parameters:
        - { name: connection_id, in: path, required: true, schema: { type: string } }
        - { name: repo_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RepoDetail" }
        "404": { description: Not found }

  /repos/{connection_id}/{repo_id}/checks/{check_id}/remediate:
    post:
      tags: [remediation]
      summary: >
        Human-triggered remediation (FR-011–FR-018). kind=settings_patch applies a scoped
        change; kind=config_pr opens a PR (never push/force-push, FR-014); deep_link/report
        are recorded only. Idempotent: an existing open Hangar PR is surfaced, not duplicated (FR-015).
      parameters:
        - { name: connection_id, in: path, required: true, schema: { type: string } }
        - { name: repo_id, in: path, required: true, schema: { type: string } }
        - { name: check_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind]
              properties:
                kind: { type: string, enum: [report, deep_link, settings_patch, config_pr] }
      responses:
        "200":
          description: Result of the correction
          content:
            application/json:
              schema:
                type: object
                properties:
                  state: { type: string, enum: [working, pr_open, fixed, deep_link] }
                  pr_url: { type: string, nullable: true }
                  audit: { $ref: "#/components/schemas/AuditEntry" }
                  idempotent_hit: { type: boolean, description: true if an existing open PR was surfaced (FR-015) }
        "403":
          description: Connection lacks write scope — collapses to deep-link (FR-018)
          content:
            application/json:
              schema: { type: object, properties: { deep_link_url: { type: string } } }

  /repos/{connection_id}/{repo_id}/checks/{check_id}/merge:
    post:
      tags: [remediation]
      summary: >
        Mark a Hangar-authored PR merged — the finding flips to pass and the merge is
        audited (prototype markMerged; FR-005a, FR-016).
      parameters:
        - { name: connection_id, in: path, required: true, schema: { type: string } }
        - { name: repo_id, in: path, required: true, schema: { type: string } }
        - { name: check_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Finding flipped to pass
          content:
            application/json:
              schema:
                type: object
                properties:
                  state: { type: string, enum: [fixed] }
                  pr_url: { type: string, nullable: true }
                  idempotent_hit: { type: boolean }
        "409":
          description: >
            No open Hangar PR exists for this check, so there is nothing to mark merged
            (prevents fabricating a 'PR merged' pass + audit entry, FR-016).
          content:
            application/json:
              schema: { type: object, properties: { detail: { type: string } } }

  /checks/{check_id}/remediate-batch:
    post:
      tags: [remediation]
      summary: >
        Fleet-wide remediation — apply one check's correction across many repos in a single
        operator action (PR-first, idempotent, one audit entry per repo; read-only
        connections collapse to a deep-link). The kind is resolved server-side.
      parameters:
        - { name: check_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targets]
              properties:
                targets:
                  type: array
                  items:
                    type: object
                    required: [connection_id, repo_id]
                    properties:
                      connection_id: { type: string }
                      repo_id: { type: string }
      responses:
        "200":
          description: Per-target outcomes + a status roll-up
          content:
            application/json:
              schema:
                type: object
                properties:
                  check_id: { type: string }
                  summary:
                    type: object
                    additionalProperties: { type: integer }
                    description: count of targets per outcome status
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        connection_id: { type: string }
                        repo_id: { type: string }
                        status: { type: string, enum: [pr_open, fixed, deep_link, not_found, error] }
                        pr_url: { type: string, nullable: true }
                        deep_link_url: { type: string, nullable: true }
                        idempotent_hit: { type: boolean }
                        detail: { type: string, nullable: true }
        "404": { description: Unknown check }

components:
  parameters:
    Connection:
      name: connection
      in: query
      required: false
      description: Filter the fleet to one connection id, or "all" (FR-004).
      schema: { type: string, default: all }
  schemas:
    Tone:
      type: string
      enum: [pass, warn, fail, unknown, neutral]
      description: status-only color token (maps to --pass/--warn/--fail/--unknown)
    FindingStatus:
      type: string
      enum: [pass, fail, unknown, pending, working, suppressed]
      description: >-
        effective status incl. remediation overlay (FR-005, FR-005a). `suppressed` = the
        repo opted out of this check via its committed `.hangar.json`; it is excluded from
        the score denominator and never shown as a fabricated pass.
    RepoRow:
      type: object
      properties:
        id: { type: string }
        connection_id: { type: string, description: owning connection — used to address the repo connection-scoped }
        connection_badge: { type: string }
        description: { type: string }
        open_prs: { type: integer }
        bot_prs: { type: integer, description: "open PRs from a dependency-update bot (Dependabot or Renovate)" }
        ci: { type: string, enum: [pass, fail, none] }
        license: { type: string, nullable: true, description: "SPDX id of the detected license (e.g. MIT); null when absent/unidentifiable" }
        alerts_total: { type: integer }
        alerts_tone: { $ref: "#/components/schemas/Tone" }
        release_pending_days: { type: integer, nullable: true }
        hygiene_pct: { type: integer }
    CatalogCheck:
      type: object
      properties:
        id: { type: string }
        label: { type: string }
        tier: { type: string, enum: [patch, pr, link, report] }
        tier_label: { type: string, example: "API · PR" }
        enabled: { type: boolean }
        has_target: { type: boolean }
        target: { type: integer, nullable: true }
        pass_count: { type: integer }
        repo_count: { type: integer }
    Policy:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        entries:
          type: array
          items:
            type: object
            properties:
              check_id: { type: string }
              enabled: { type: boolean }
              params: { type: object, additionalProperties: true }
              severity: { type: string, enum: [low, medium, high] }
    ConnectionCard:
      type: object
      properties:
        id: { type: string }
        label: { type: string }
        type: { type: string, enum: [GitHub, Gitea] }
        provider_type: { type: string, enum: [github, gitea] }
        has_credential: { type: boolean, description: "whether a real credential is stored (reusable by another connection)" }
        scope: { type: string }
        auth_mode: { type: string }
        base_url: { type: string, description: "provider browser host this connection targets (github.com, or a GHES/GHEC enterprise host)" }
        repos: { type: integer }
        writes: { type: boolean }
        write_label: { type: string, example: "Read + write" }
        remediation: { type: string, example: "API + PR + deep-link" }
        synced: { type: string, description: "humanized last-sync time for display" }
        last_sync_at:
          type: string
          format: date-time
          nullable: true
          description: "machine-readable last successful sync (null if never); poll this to detect a refresh landing"
        repo_allowlist:
          type: array
          nullable: true
          items: { type: string }
          description: "operator's repo selection; null ⇒ watching all repos"
    AppRegistration:
      type: object
      required: [base_url, slug, app_id, delete_app_url]
      properties:
        base_url: { type: string, description: "browser host this App was registered for" }
        slug: { type: string, description: "the App's GitHub slug" }
        app_id: { type: string }
        delete_app_url: { type: string, description: "deep link to the App's Advanced settings — where the owner deletes it on GitHub" }
    ForgetAppResult:
      type: object
      required: [uninstalled, uninstall_failed, connections_removed, delete_app_url]
      properties:
        uninstalled:
          type: array
          items: { type: string }
          description: "accounts the App was uninstalled from"
        uninstall_failed:
          type: array
          description: "installations that could not be uninstalled — finish manually via url"
          items:
            type: object
            required: [account, url]
            properties:
              account: { type: string }
              url: { type: string, description: "deep link to uninstall this installation on GitHub" }
        connections_removed:
          type: array
          items: { type: string }
          description: "connection ids dropped (they depended on this App)"
        delete_app_url: { type: string, description: "deep link to finish deleting the App on GitHub (no API for this)" }
    SyncAccepted:
      type: object
      required: [status]
      properties:
        status: { type: string, example: accepted }
        connection_id:
          type: string
          nullable: true
          description: "the refreshed connection; null for a fleet-wide refresh"
    AuditEntry:
      type: object
      properties:
        timestamp: { type: string }
        repo_id: { type: string }
        check_label: { type: string }
        connection_label: { type: string }
        actor: { type: string }
        result: { type: string }
        pr_url: { type: string, nullable: true }
    RepoDetail:
      type: object
      properties:
        id: { type: string }
        connection_label: { type: string }
        description: { type: string }
        read_only: { type: boolean }
        hygiene_pct: { type: integer }
        pass_count: { type: string, example: "14/21 scored · 2 suppressed" }
        suppressed_count: { type: integer, description: "checks this repo opted out of via .hangar.json (excluded from the score denominator)" }
        open_prs: { type: integer }
        ci: { type: string, enum: [pass, fail, none] }
        pull_requests:
          type: array
          items:
            type: object
            properties:
              title: { type: string }
              kind: { type: string, enum: [dependabot, renovate, human], description: "the PR's author: a dependency bot or a human" }
              status: { type: string, description: 'human-display status (e.g. "open", "draft")' }
              status_tone: { $ref: "#/components/schemas/Tone" }
              age: { type: string }
              url: { type: string, nullable: true, description: link to the PR on the provider }
        alerts:
          type: array
          items: { type: object, properties: { severity: { type: string }, count: { type: integer } } }
        check_groups:
          type: array
          items:
            type: object
            properties:
              group: { type: string }
              checks:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    label: { type: string }
                    status: { $ref: "#/components/schemas/FindingStatus" }
                    kind: { type: string, enum: [report, deep_link, settings_patch, config_pr], description: structured remediation kind the client sends back (never parse the action label) }
                    tier_label: { type: string }
                    evidence: { type: string }
                    suppressed_reason: { type: string, nullable: true, description: "operator's reason from .hangar.json when status is suppressed; null otherwise" }
                    open_pr_url: { type: string, nullable: true }
                    open_pr_number: { type: integer, nullable: true }
                    primary_action: { type: string, nullable: true, description: "display label only, e.g. Open fix PR | Enable | Open in GitHub" }
                    secondary_action: { type: string, nullable: true, example: "Mark merged" }
